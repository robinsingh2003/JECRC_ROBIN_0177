<!DOCTYPE html>
<html>
<head>
<title>Dynamic Module Calculator</title>

<style>
body{
font-family: Arial;
padding:40px;
}

.container{
display:flex;
gap:40px;
}

.box{
border:1px solid #ccc;
padding:20px;
width:350px;
border-radius:8px;
}

input{
width:100%;
padding:8px;
margin-top:10px;
}

button{
margin-top:10px;
padding:6px 12px;
}

.result{
margin-top:10px;
font-weight:bold;
color:blue;
}
</style>

</head>

<body>

<h2>Dynamic Module Calculator</h2>

<div class="box">

<input type="number" id="num1" placeholder="Enter first number">

<input type="number" id="num2" placeholder="Enter second number">

<button onclick="calculate('add')">Add</button>
<button onclick="calculate('subtract')">Subtract</button>
<button onclick="calculate('multiply')">Multiply</button>
<button onclick="calculate('divide')">Divide</button>

<div class="result" id="result"></div>

</div>


<script type="module">

/* Module code stored as text */
const utils = `

export const PI = 3.14159;

export function add(a,b){
 return a + b;
}

export function subtract(a,b){
 return a - b;
}

export function multiply(a,b){
 return a * b;
}

export function divide(a,b){
 if(b === 0){
  throw new Error("Cannot divide by zero");
 }
 return a / b;
}

`;

/* Create module dynamically */
const blob = new Blob([utils], { type: "text/javascript" });

const url = URL.createObjectURL(blob);

/* Import module */
const module = await import(url);


/* Function called when user clicks buttons */
window.calculate = function(operation){

const num1 = parseFloat(document.getElementById("num1").value);
const num2 = parseFloat(document.getElementById("num2").value);

let result;

try{

switch(operation){

case "add":
result = module.add(num1,num2);
break;

case "subtract":
result = module.subtract(num1,num2);
break;

case "multiply":
result = module.multiply(num1,num2);
break;

case "divide":
result = module.divide(num1,num2);
break;

}

document.getElementById("result").innerText = "Result: " + result;

}catch(error){

document.getElementById("result").innerText = error.message;

}

};

</script>

</body>
</html>
