<div class="box glass">
  <h2>🛍 Products</h2>

  <input placeholder="🔍 Search..." [(ngModel)]="search" />
  
  <select [(ngModel)]="category">
    <option value="">All Categories</option>
    <option>Electronics</option>
    <option>Fashion</option>
  </select>

  <div class="grid">
    <div class="card" *ngFor="let p of filteredProducts()">
      <img [src]="p.image">
      <h3>{{p.name}}</h3>
      <p>₹{{p.price}}</p>
      <p>⭐ {{p.rating}}</p>
      <button (click)="add.emit(p)">Add to Cart</button>
    </div>
  </div>
</div>
