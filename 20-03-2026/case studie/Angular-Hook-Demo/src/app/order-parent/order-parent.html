<div class="parent">
  <h2>рџ‘ЁвЂЌрџ‘©вЂЌрџ‘§ Lifecycle Demo Dashboard</h2>

  <div class="btn-group">
    <button (click)="updateOrder()">рџ”„ Update Order</button>
    <button (click)="toggleChild()">
      {{ showChild ? 'вќЊ Destroy Child' : 'вњ… Create Child' }}
    </button>
    <button class="clear" (click)="clearLogs()">рџ§№ Clear Logs</button>
  </div>

  <!-- STATUS -->
  <p class="status-msg" *ngIf="showChild">рџџў Child is Active</p>
  <p class="status-msg destroy" *ngIf="!showChild">рџ”ґ Child is Destroyed</p>

  <!-- CHILD -->
  <div *ngIf="showChild">
    <app-order-child
      [order]="order"
      (logEvent)="addLog($event, 'hook')">
    </app-order-child>
  </div>

  <!-- LOG PANEL -->
  <div class="log-box">
    <h3>рџ“њ Lifecycle Logs</h3>

    <div *ngFor="let log of logs"
         class="log"
         [ngClass]="log.type">

      <span class="time">[{{ log.time }}]</span>
      {{ log.message }}

    </div>
  </div>
</div>
