<div class="container">

  <h3>Book Appointment</h3>

  <label>Patient Name</label>
  <input [(ngModel)]="patientName" (input)="update()">

  <label>Doctor</label>
  <select [(ngModel)]="doctor" (change)="update()">
    <option *ngFor="let d of doctors">{{ d }}</option>
  </select>

  <label>Date</label>
  <input type="date" [(ngModel)]="date" [min]="today" (change)="update()">

  <label>Type</label>
  <select [(ngModel)]="type" (change)="update()">
    <option>Online</option>
    <option>Offline</option>
  </select>

  <label>Symptoms</label>
  <textarea [(ngModel)]="symptoms" (input)="update()"></textarea>

</div>
