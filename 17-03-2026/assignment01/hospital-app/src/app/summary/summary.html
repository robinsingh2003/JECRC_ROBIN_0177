<div class="summary" *ngIf="data">

  <h3>Appointment Summary</h3>

  <p><b>Name:</b> {{ data.patientName }}</p>
  <p><b>Doctor:</b> {{ data.doctor }}</p>
  <p><b>Date:</b> {{ data.date }}</p>
  <p><b>Type:</b> {{ data.type }}</p>
  <p><b>Symptoms:</b> {{ data.symptoms }}</p>
  <p><b>Fee:</b> ₹{{ data.fee }}</p>

</div>
