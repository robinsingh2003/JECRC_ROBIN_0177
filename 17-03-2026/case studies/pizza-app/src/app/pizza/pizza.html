<label>Pizza Name</label>  
<input type="text" [(ngModel)]="pizzaName" />
<br><br>
<label for="">Quantity:</label>
<input type="number"[(ngModel)]="quantity" />
<br><br>
<label for="">Delivery Address:</label>
<textarea [(ngModel)]="address"></textarea>
<hr>
<h3>Order Summary</h3>
<p>Pizza Name: {{ pizzaName }}</p>
<p>Quantity: {{ quantity }}</p>
<p>Address: {{ address }}</p>
